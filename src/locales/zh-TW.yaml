memorialLobbies[0]:
  voice:
    CH0334_MemorialLobby_1_1: 欸嘿嘿。老師，嚇到了嗎？
    CH0334_MemorialLobby_1_2: 因為想要和老師欣賞這片夜空……所以呼喚了您。
    CH0334_MemorialLobby_2_1: 真是……十分美麗呢。
    CH0334_MemorialLobby_2_2: 愛麗絲的世界也好，還沒有去過的世界也好……肯定還會有許多這樣美好的事物。
    CH0334_MemorialLobby_3_1: 但是，真不可思議。
    CH0334_MemorialLobby_3_2: 世界是，這麼地美麗，但為何人與人之間還是會有紛爭呢？
    CH0334_MemorialLobby_4: 就如同那片星空一般，這個世界的美好，明明已經可以多到和大家一起分享也沒關係的程度了……
    CH0334_MemorialLobby_5: ……果然，愛麗絲還是不能理解。
# Kei角色的語音對話翻譯
memorialLobbies[1]:
  voice:
    CH0335_MemorialLobby_1_1: 別擔心。
    CH0335_MemorialLobby_1_2: 我是不會消失的。
    CH0335_MemorialLobby_2_1: 恰恰相反。
    CH0335_MemorialLobby_2_2: 不管用什麼手段，我都會活下去。
    CH0335_MemorialLobby_3_1: 如果老師不拋棄這個世界的話。
    CH0335_MemorialLobby_3_2: 那我到最後也不會放棄的。
    CH0335_MemorialLobby_4_1: 所以放心吧……絕對，沒問題的。
    CH0335_MemorialLobby_4_2: 我會一直在這裡。
    CH0335_MemorialLobby_5_1: 這話我只在這裡說……我——
    CH0335_MemorialLobby_5_2: 並不討厭老師呢。

memorialLobbies[2]:
  voice:
    CH0063_MemorialLobby_1_1: 為什麼大家，都那麼喜歡大海呢……我一直都這麼思考著。
    CH0063_MemorialLobby_1_2: 雖然大家看起來都很開心，但是我實在是沒辦法喜歡大海……
    CH0063_MemorialLobby_2_1: 在水裡會看不清楚，腳又無法著地，會令人不安……
    CH0063_MemorialLobby_2_2: 老師有沒有也這麼想過？
    CH0063_MemorialLobby_3_1: 特別是夜晚的大海，就像黑暗一樣，很陰森……
    CH0063_MemorialLobby_3_2: 光是注視著就好像會被吸進去，雖然沒辦法喜歡……
    CH0063_MemorialLobby_4_1: 不過……現在，好像能稍微，理解大家的心情了。
    CH0063_MemorialLobby_4_2: 原來大海，這麼美麗呀。
    CH0063_MemorialLobby_5_1: 真神奇……至今為止，明明沒有這麼想過。
    CH0063_MemorialLobby_5_2: 謝謝你，老師。陪伴在我身邊……

