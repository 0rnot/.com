# Aris(Battle)角色的语音对话翻译
memorialLobbies[0]:
  voice:
    CH0334_MemorialLobby_1_1: 诶嘿嘿。老师，吓到了吗？
    CH0334_MemorialLobby_1_2: 因为想要和老师欣赏这片夜空……所以呼唤了您。
    CH0334_MemorialLobby_2_1: 真是……十分美丽呢。
    CH0334_MemorialLobby_2_2: 爱丽丝的世界也好，还没有去过的世界也好……肯定还会有很多这样美好的事物。
    CH0334_MemorialLobby_3_1: 但是，真不可思议。
    CH0334_MemorialLobby_3_2: 世界是，这么地美丽，但为何人与人之间还是会有纷争呢？
    CH0334_MemorialLobby_4: 就如同那片星空一般，这个世界的美好，明明已经可以多到和大家一起分享也没关系的程度了……
    CH0334_MemorialLobby_5: ……果然，爱丽丝还是不能理解。
# Kei角色的语音对话翻译
memorialLobbies[1]:
  voice:
    CH0335_MemorialLobby_1_1: 别担心。
    CH0335_MemorialLobby_1_2: 我是不会消失的。
    CH0335_MemorialLobby_2_1: 恰恰相反。
    CH0335_MemorialLobby_2_2: 不管用什么手段，我都会活下去。
    CH0335_MemorialLobby_3_1: 如果老师不抛弃这个世界的话。
    CH0335_MemorialLobby_3_2: 那我到最后也不会放弃的。
    CH0335_MemorialLobby_4_1: 所以放心吧……绝对，没问题的。
    CH0335_MemorialLobby_4_2: 我会一直在这里。
    CH0335_MemorialLobby_5_1: 这话我只在这里说……我——
    CH0335_MemorialLobby_5_2: 并不讨厌老师呢。

memorialLobbies[2]:
  voice:
    CH0063_MemorialLobby_1_1: 为什么大家都那么喜欢大海呢？我一直在思考这个问题。
    CH0063_MemorialLobby_1_2: 虽然大家看起来都很开心……可我却无论如何都喜欢不起来……
    CH0063_MemorialLobby_2_1: 水面下的东西都看不太清楚，脚踩不到底也让我觉得放不下心……
    CH0063_MemorialLobby_2_2: 老师不这么觉得吗？
    CH0063_MemorialLobby_3_1: 特别是晚上，大海简直就像巨大的黑洞一样，
    CH0063_MemorialLobby_3_2: 光是这样看着，就有种要被吸进去的感觉……
    CH0063_MemorialLobby_4_1: 可是……现在我好像稍微明白一点……大家的心情了。
    CH0063_MemorialLobby_4_2: 大海，原来这么美啊。
    CH0063_MemorialLobby_5_1: 真是不可思议……我以前，从来没这么想过。
    CH0063_MemorialLobby_5_2: 老师，谢谢你……陪在我的身边…… ……教会了我这么多事。
