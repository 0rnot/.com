# 思い出ロビー
memorialLobbies:
  - name: アリス
    path: '/l2d/aris/'
    skel: 'Aris_home.skel'
    atlas: 'Aris_home.atlas'
    voice:
      Aris_MemorialLobby_1: アリスはキヴォトスに魔法がないと思えません。
      Aris_MemorialLobby_2_1: 魔法は存在しています。
      Aris_MemorialLobby_2_2: だって、先生は今アリスを幸せにしてくれましたから
      Aris_MemorialLobby_3_1: ゲームが面白い理由は
      Aris_MemorialLobby_3_2: そこに世界の美しさを込められているから。
      Aris_MemorialLobby_3_3: これは先生を通じてわかったことです。
      Aris_MemorialLobby_4_1: ゲームも猫も友達も、そして、
      Aris_MemorialLobby_4_2: 今この瞬間もこの世界には美しいものが沢山あります。
      Aris_MemorialLobby_5_1: アリスはもっと知りたいです。
      Aris_MemorialLobby_5_2: 先生と一緒にこの世界のことをもっと学びたいです！
    offset: 0.45
    dialogueDisplay:
      x: -1/4 - 1/16
      y: -1/16
      position: right

  - name: ヒナ（水着）
    path: '/l2d/hina_swimsuit/'
    skel: 'CH0063_home.skel'
    atlas: 'CH0063_home.atlas'
    voice:
      CH0063_MemorialLobby_1_1: 何でみんな、そんなに海が好きなんだろう……って、ずっとそう思ってた。
      CH0063_MemorialLobby_1_2: みんなは楽しそうだけど、私はどうしても好きになれなくて…
      CH0063_MemorialLobby_2_1: 水の中はよく見えないし、足が付かないと不安だし……
      CH0063_MemorialLobby_2_2: 先生も、そう思ったことない？
      CH0063_MemorialLobby_3_1: 特に夜の海は、まるで暗闇みたいに不気味で……
      CH0063_MemorialLobby_3_2: 見てるだけで吸い込まれそうで、好きになれなかったけど……
      CH0063_MemorialLobby_4_1: でも……今は、みんなの気持ちが少しだけ分かった気がする。
      CH0063_MemorialLobby_4_2: 海って、こんなに綺麗だったのね。
      CH0063_MemorialLobby_5_1: 不思議……今まで、こんな風に思ったことなかったのに。
      CH0063_MemorialLobby_5_2: ありがとう、先生。一緒にいてくれて…… 色んなことを、教えてくれて。
    offset: 0.68
    dialogueDisplay:
      x: 1/4 + 1/8
      y: -1/8
      position: left

