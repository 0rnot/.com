<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    
    <!-- ▼ ダークモードを強制回避し、ライトモードに固定する設定 ▼ -->
    <meta name="color-scheme" content="light" />
    <!-- ▲ ここまで ▲ -->

    <meta content="yes" name="mobile-web-app-capable" />
    <meta content="yes" name="apple-mobile-web-app-capable" />
    <meta content="black-translucent" name="apple-mobile-web-app-status-bar-style" />
    <meta content="/" name="msapplication-starturl" />
    <link rel="bookmark" href="<%- favicon %>" />
    <link rel="apple-touch-icon-precomposed" href="<%- favicon %>" />
    <meta name="description" content="<%- description %>" />
    <meta name="keywords" content="<%- keywords %>" />
    <meta name="author" content="<%- favicon %>" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="<%- themeColor %>" name="theme-color" />
    <link id="favicon" href="<%- favicon %>" rel="icon" />
    <title><%- title %></title>

    <!-- ▼★超重要変更：スマホに「自分は横幅1280pxのPCモニターだ」と錯覚させる魔法 ▼ -->
    <meta name="viewport" content="width=1280, user-scalable=no" />
    <!-- ▲ ここまで ▲ -->

    <!-- ▼ スマホ縦画面の時の保護魔法 ＆ 吹き出し消去魔法 ▼ -->
    <style>
      /* 基本は警告画面を隠しておく */
      #rotate-please {
        display: none;
      }
      
      /* 縦向き（portrait）の時だけ発動 */
      @media screen and (orientation: portrait) {
        #rotate-please {
          display: flex;
          position: fixed;
          top: 0; left: 0; width: 100vw; height: 100vh;
          background: #f0f0f0;
          z-index: 999999; /* 一番手前に表示 */
          flex-direction: column;
          justify-content: center;
          align-items: center;
          text-align: center;
          padding: 20px;
          box-sizing: border-box;
        }
        /* 縦画面の時は裏のサイト本体を完全に消去してレイアウト崩れを防ぐ */
        #app {
          display: none !important;
        }
      }

      /* ▼▼ 全画面共通・吹き出し完全消去のグローバル魔法 ▼▼ */
      [class*="dialogue"], 
      [class*="Dialogue"], 
      [class*="talk"], 
      [class*="Talk"],
      [class*="bubble"] {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
        color: transparent !important;
      }
      /* ▲▲ ここまで ▲▲ */
    </style>
    <!-- ▲ ここまで ▲ -->
  </head>
  <body>
    <!-- ▼ スマホ縦持ちユーザーへの警告メッセージ ▼ -->
    <div id="rotate-please">
      <div style="font-size: 60px; margin-bottom: 20px;">📱🔄</div>
      <h2 style="color: #128AFA; margin-bottom: 15px;">先生、端末を横向きにしてください！</h2>
      <p style="color: #666; font-weight: bold; line-height: 1.5; font-size: 16px;">
        このシステムはPC版UIでの閲覧に最適化されています。<br>
        スマホの「画面の縦向きロック」を解除して<br>端末を横に持ち替えてください。<br>
        PCの場合は画面を最大化してください。
      </p>
    </div>
    <!-- ▲ ここまで ▲ -->

    <div id="app"></div>
    <script src="/src/main.js" type="module"></script>

    <!-- ▼ UIフレームワーク（Arco Design）が勝手にダークモードになるのを防ぐ処理 ▼ -->
    <script>
      document.body.removeAttribute('arco-theme');
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.attributeName === 'arco-theme') {
            document.body.removeAttribute('arco-theme');
          }
        });
      });
      observer.observe(document.body, { attributes: true });
    </script>
    <!-- ▲ ここまで ▲ -->
  </body>
</html>
