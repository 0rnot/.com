# Live2D角色配置
memorialLobbies:
  # 角色1 - Aris(Battle)
  - name: Aris(Battle)
    # Live2D模型文件路径
    path: '/l2d/aris_battle/'
    # 骨骼动画文件
    skel: 'CH0334_home.skel'
    # 纹理图集文件
    atlas: 'CH0334_home.atlas'
    # 角色在屏幕中的水平位置偏移（0-1之间）
    offset: 0.5
    # 对话框显示位置配置
    dialogueDisplay:
      # X坐标位置（可以是分数）
      x: -1/4 - 1/16
      # Y坐标位置（可以是分数）
      y: -1/16
      # 对话框位置（left/right）
      position: right

  # 角色2 - Kei
  - name: Kei
    # Live2D模型文件路径
    path: '/l2d/kei/'
    # 骨骼动画文件
    skel: 'CH0335_home.skel'
    # 纹理图集文件
    atlas: 'CH0335_home.atlas'
    # 角色在屏幕中的水平位置偏移（0-1之间）
    offset: 0.62
    # 对话框显示位置配置
    dialogueDisplay:
      # X坐标位置（可以是分数）
      x: 1/4 + 1/8
      # Y坐标位置（可以是分数）
      y: -1/16
      # 对话框位置（left/right）
      position: left

  # 角色3 - Hina
  - name: Hina_swimsuit
    # Live2D模型文件路径
    path: '/l2d/hina_swimsuit/'
    # 骨骼动画文件
    skel: 'CH0063_home.skel'
    # 纹理图集文件
    atlas: 'CH0063_home.atlas'
    # 角色在屏幕中的水平位置偏移（0-1之间）
    offset: 0.68
    # 对话框显示位置配置
    dialogueDisplay:
      # X坐标位置（可以是分数）
      x: 1/4 + 1/8
      # Y坐标位置（可以是分数）
      y: -1/8
      # 对话框位置（left/right）
      position: left

