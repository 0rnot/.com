# 基础配置文件（0rnot / PEBIKAC 完全適応版）
title: 0rnot Archive
description: Once in a blue moon | Public Servant / Capitalism Hacker
favicon: /favicon144.png
author: 0rnot
keywords: 'Blue Archive, 0rnot, PEBIKAC, Capitalism Hacker, Public Servant, Arch Linux, LLM'

ICP: ''
gongan: ''

manifest:
  name: 0rnot Archive
  short_name: 0rnot
