# 基础配置文件（所有语言通用）
# Website Basic Configuration

# 网站标题 - 浏览器标签页显示的标题
title: Fish Archive

# 网站描述 - 用于搜索引擎优化和社交媒体分享
description: A personal homepage in Blue Archive style.

# 网站图标路径 - 浏览器标签页显示的小图标
favicon: /favicon144.png

# 网站作者姓名
author: Yuzifu

# 网站关键词 - 用于搜索引擎优化，逗号分隔
keywords: 'Blue Archive, 小鱼yuzifu, Personal Homepage'

# ICP备案号 - 中国大陆备案信息，留空表示未备案
ICP: ''
# 公安备案号 - 中国大陆网站备案信息，留空表示未备案
gongan: ''

# PWA配置 - 渐进式Web应用配置
manifest:
  # PWA应用完整名称
  name: Fish Archive

  # PWA应用简短名称 - 用于桌面显示
  short_name: Fish Archive

  # PWA应用描述
  description: A personal homepage in Blue Archive style.

  # PWA主题颜色 - 影响浏览器UI颜色
  theme_color: '#128AFA'

  # PWA启动URL - 应用启动时打开的页面
  start_url: /

  # PWA应用唯一标识符
  id: Homepage

  # PWA图标配置
  icons:
    # 大尺寸图标 - 用于桌面安装
    - src: /favicon512.png
      sizes: 512x512
      purpose: any maskable

    # 小尺寸图标 - 用于移动设备
    - src: /favicon144.png
      sizes: 144x144

# 个人游戏等级信息
level: 90 # 当前等级
exp: 8382 # 当前经验值
nextExp: 8381 # 升级所需经验值
gold: 11451419 # 信用点数量
pyroxene: 24000 # 青辉石数量

# Iconfont字体库地址 - 阿里云图标字体库
iconfont: 'https://at.alicdn.com/t/c/font_4336463_umq8x001wf9.js'

# 底部项目展示区域 - 显示相关项目链接
dock:
  # 项目1
  - name: Bandcomic
    href: 'https://github.com/sf-yuzifu/bandcomic'
    imgSrc: /img/bandcomic.png

  # 项目2
  - name: BCM Converter Project
    href: 'https://gitee.com/sf-yuzifu/bcm_convertor'
    imgSrc: /img/convertor.png

  # 项目3
  - name: Waddle Project
    href: 'https://waddle.cocotais.cn/'
    imgSrc: /img/waddle2.png

  # 项目4
  - name: Boxy Project
    href: 'https://boxy.cocotais.cn/'
    imgSrc: /img/boxy.png

  # 项目5
  - name: Fish Archive Project
    href: 'https://gitee.com/sf-yuzifu/eat-fish-together'
    imgSrc: /img/fish.png

# 左侧联系方式区域
contact:
  # 联系方式1
  - name: BandBBS
    href: 'https://www.bandbbs.cn/members/969142/'
    iconfont: icon-bandbbs

  # 联系方式2
  - name: Gitee
    href: 'https://gitee.com/sf-yuzifu'
    iconfont: icon-gitee

  # 联系方式3
  - name: Github
    href: 'https://github.com/sf-yuzifu'
    iconfont: icon-github

  # 联系方式4
  - name: BiliBili
    href: 'https://space.bilibili.com/447666445'
    iconfont: icon-bilibili

# 任务按钮配置 - 页面左下角的任务按钮
task:
  # 任务按钮显示文本
  name: Blog Link
  # 任务按钮链接地址
  href: 'https://blog.yzf.moe/'

