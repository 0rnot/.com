  theme_color: '#128AFA'
  start_url: /
  id: 0rnot
  icons:
    - src: /favicon512.png
      sizes: 512x512
      purpose: any maskable
    - src: /favicon144.png
      sizes: 144x144

# ゲーム風ステータス（好みで調整OK）
level: 99
exp: 99999
nextExp: 100000
gold: 1145141919
pyroxene: 99999

iconfont: 'https://at.alicdn.com/t/c/font_4336463_umq8x001wf9.js'

# 底部ドック（あなたのGitHubを中心に）
dock:
  - name: GitHub 0rnot
    href: 'https://github.com/0rnot'
    imgSrc: /img/fish.png          # ← 後であなたの好きな画像に変更可
  - name: Metrics
    href: 'https://github.com/0rnot/0rnot'
    imgSrc: /img/convertor.png
  - name: Snake Grid
    href: 'https://github.com/0rnot/0rnot'
    imgSrc: /img/waddle2.png
  - name: 0rnot Main Repo
    href: 'https://github.com/0rnot'
    imgSrc: /img/fish.png

# 連絡先（あなたのXとGitHubを追加）
contact:
  - name: GitHub
    href: 'https://github.com/0rnot'
    iconfont: icon-github
  - name: X (Twitter)
    href: 'https://x.com/PE6K4C'
    iconfont: icon-twitter          # iconfontにTwitterアイコンがあれば使用（なければ後で追加）
  - name: Blog / Memo
    href: '#'                       # ブログがあればここにURLを入れる
    iconfont: icon-link

# 左下タスクボタン
task:
  name: 0rnot GitHub
  href: 'https://github.com/0rnot'

# Banner音楽（好みで変更・削除可）
banner:
  musicID:
    - 2059151619
    - 2098476758
    - 2630220461

# Live2Dメモリーホール（プロジェクトに存在するモデルを優先的に使用）
memorialLobbies:
  - name: Aris(Battle)
    path: '/l2d/aris_battle/'       # または /l2d/aris/ に合わせて調整
    skel: 'CH0334_home.skel'
    atlas: 'CH0334_home.atlas'
    offset: 0.5
    dialogueDisplay:
      x: -1/4 - 1/16
      y: -1/16
      position: right

  - name: CH0334_spr
    path: '/l2d/CH0334_spr/'
    skel: 'CH0334_spr.skel'
    atlas: 'CH0334_spr.atlas'
    offset: 0.55
    dialogueDisplay:
      x: 1/4 + 1/8
      y: -1/16
      position: left

# Bio（あなたのプロフィール画像をここに入れるのがおすすめ）
bio:
  student:
    - name: CH0334_spr
      path: '/l2d/CH0334_spr/'
      skel: 'CH0334_spr.skel'
      atlas: 'CH0334_spr.atlas'
  bth:
  - name: 0rnot
    path: /img/card/0rnot.png       # ← ここにあなたのヘッダー画像やキャラ画像をアップロードして置き換え推奨
  - name: PEBIKAC
    path: /img/card/pebikac.png     # あなたのアイコン画像を入れると良い
